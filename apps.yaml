# Registry of the product app repos mounted under apps/.
# This file is the single source of truth for: which apps exist, where their git
# repos live, and each repo's branch model. setup.sh parses it; docs link from it.
#
# FORMAT IS STRICT (parsed by awk in setup.sh — no nesting beyond this shape):
#   - name: <folder name under apps/>
#     repo: <git URL (SSH form; setup.sh can rewrite to HTTPS)>
#     trunk: <integration trunk — features/* merge here>
#     uat: <protected deployment branch — auto-deploys to UAT; promoted from trunk>
#     production: <protected deployment branch — auto-deploys to prod; promoted from uat>
#
# Branch model: develop on features/<slug> off trunk → merge back to trunk → DELETE the
# branch immediately. Never push to a deployment branch (deploy/*) — the owner promotes.

- name: backend
  repo: git@github.com:{{GITHUB_ORG}}/{{PLATFORM_SLUG}}-backend.git
  trunk: main
  uat: deploy/uat
  production: deploy/prod

- name: frontend
  repo: git@github.com:{{GITHUB_ORG}}/{{PLATFORM_SLUG}}-frontend.git
  trunk: main
  uat: deploy/uat
  production: deploy/prod

- name: backoffice
  repo: git@github.com:{{GITHUB_ORG}}/{{PLATFORM_SLUG}}-backoffice.git
  trunk: main
  uat: deploy/uat
  production: deploy/prod

- name: mobile
  repo: git@github.com:{{GITHUB_ORG}}/{{PLATFORM_SLUG}}-mobile.git
  trunk: main
  uat: deploy/uat
  production: deploy/prod
